name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  c-client:
    name: C client (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential libssl-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3
          echo "OPENSSL_PREFIX=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

      - name: Build libraries
        run: make

      - name: Run tests
        run: make test

      - name: Build perf client
        run: make perf_client

  win32-example:
    name: Win32 example (MinGW + Wine)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install cross-build and Wine dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libssl-dev mingw-w64 perl wine64

      - name: Build static Windows OpenSSL
        env:
          OPENSSL_TAG: openssl-3.5.7
          OPENSSL_PREFIX: ${{ runner.temp }}/openssl-mingw64
        run: |
          git clone --depth 1 --branch "$OPENSSL_TAG" \
            https://github.com/openssl/openssl.git \
            "${{ runner.temp }}/openssl-src"
          cd "${{ runner.temp }}/openssl-src"
          ./Configure mingw64 \
            --cross-compile-prefix=x86_64-w64-mingw32- \
            --prefix="$OPENSSL_PREFIX" \
            --libdir=lib \
            no-shared no-tests no-apps
          make -s -j2
          make -s install_sw

      - name: Cross-build and run Win32 integration
        env:
          MINGW_OPENSSL_PREFIX: ${{ runner.temp }}/openssl-mingw64
          WINDOWS_RUNNER: /usr/lib/wine/wine64
        run: bash tests/test_windows_example.sh

  win32-msvc:
    name: Win32 example (MSVC)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install OpenSSL for MSVC
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install openssl:x64-windows

      - name: Configure with Visual Studio
        shell: pwsh
        run: |
          cmake -S examples/win32 -B build-msvc -A x64 `
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

          $compilerFile = Get-ChildItem build-msvc/CMakeFiles `
            -Filter CMakeCCompiler.cmake -Recurse | Select-Object -First 1
          if (-not $compilerFile) {
            throw "CMake did not write C compiler metadata"
          }
          $compilerDefinition = Select-String -Path $compilerFile.FullName `
            -Pattern 'set\(CMAKE_C_COMPILER_ID "([^"]+)"\)' | Select-Object -First 1
          if (-not $compilerDefinition) {
            throw "CMake did not record a C compiler ID"
          }
          $CMAKE_C_COMPILER_ID = $compilerDefinition.Matches[0].Groups[1].Value
          if ($CMAKE_C_COMPILER_ID -ne "MSVC") {
            throw "Expected MSVC, found $CMAKE_C_COMPILER_ID"
          }

      - name: Build with strict Microsoft warnings
        run: cmake --build build-msvc --config Release --parallel

      - name: Start the native executable
        shell: pwsh
        run: |
          $output = & build-msvc/Release/win32-example.exe 2>&1
          if ($LASTEXITCODE -ne 1) {
            throw "Expected missing-configuration exit code 1, got $LASTEXITCODE"
          }
          if ($output -notmatch 'set RATELIMITLY_TENANT and RATELIMITLY_AUTH_KEY') {
            throw "Native executable did not reach configuration validation"
          }
